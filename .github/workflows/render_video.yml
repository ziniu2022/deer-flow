name: Render Manim Video

on:
  workflow_dispatch: # 手动触发开关

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t mymanimapp .

      - name: Run Manim render
        run: |
          # 1. 初始权限准备
          sudo chmod -R 777 .
          mkdir -p output
          
          # 2. 运行 Manim 渲染
          # 使用 -u root 确保容器有权创建媒体目录
          docker run --rm \
            -u root \
            -v ${{ github.workspace }}:/app \
            mymanimapp \
            main.py SceneName --media_dir ./temp_media
          
          # 3. 核心修复：渲染完成后，强制放开生成的 temp_media 目录权限
          # 否则 GitHub Actions 默认用户无权移动 root 创建的视频文件
          echo "正在处理渲染结果的访问权限..."
          sudo chmod -R 777 temp_media
          
          # 4. 查找并提取生成的 MP4 文件
          echo "正在查找并移动视频文件到输出目录..."
          find temp_media -name "*.mp4" -exec mv {} output/output.mp4 \;
          
          # 5. 最终检查
          if [ -f "output/output.mp4" ]; then
            echo "恭喜！视频渲染并提取成功。"
          else
            echo "错误：未能找到渲染生成的视频文件。"
            exit 1
          fi

      - name: Upload rendered video
        uses: actions/upload-artifact@v4
        with:
          name: rendered-video
          path: output/output.mp4
          if-no-files-found: error
